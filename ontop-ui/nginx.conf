server {
    listen 5000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Static assets with long cache ──────────────────────
    location /_next/static/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ── API routing ────────────────────────────────────────

    # Bootstrap paths → Python backend (needs LLM)
    location ~ ^/api/v1/datasources/[^/]+/bootstrap {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Java engine paths → ontop-engine (no trailing slash to match both)
    location /api/v1/endpoint-registry {
        proxy_pass http://ontop-engine:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/mappings {
        proxy_pass http://ontop-engine:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ontology {
        proxy_pass http://ontop-engine:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/sparql {
        proxy_pass http://ontop-engine:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/repositories {
        proxy_pass http://ontop-engine:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Datasources (non-bootstrap) → ontop-engine
    location /api/v1/datasources {
        proxy_pass http://ontop-engine:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Remaining API → Python backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback ───────────────────────────────────────
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
