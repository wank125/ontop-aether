# Ontop Endpoint Configuration

# Active file paths (overridden by environment variables or CLI args)
ontop.mapping=${ONTOP_ACTIVE_MAPPING_FILE:/opt/ontop-endpoint/active/active_mapping.obda}
ontop.ontology=${ONTOP_ACTIVE_ONTOLOGY_FILE:/opt/ontop-endpoint/active/active_ontology.ttl}
ontop.properties=${ONTOP_ACTIVE_PROPERTIES_FILE:/opt/ontop-endpoint/active/active.properties}
ontop.seed-dir=${ONTOP_SEED_DIR:/opt/ontop-seed}

# Multi-repository: auto-load directory (each subdirectory = one dsId)
ontop.repos-dir=${ONTOP_REPOS_DIR:}

# Multi-repository: the currently active dsId (fallback for /sparql without dsId)
ontop.active-ds-id=${ONTOP_ACTIVE_DS_ID:}

# Dev mode: enables /ontop/restart and /ontop/reformulate
ontop.dev=true

# Enable ontology download at /ontology
ontop.enable-download-ontology=true

# CORS
ontop.cors-allowed-origins=*

# Server port (container-internal, mapped by docker-compose)
server.port=${ONTOP_ENDPOINT_PORT:8080}

# Shared internal secret for management API auth (empty = disabled)
ontop.internal-secret=${ONTOP_INTERNAL_SECRET:}
