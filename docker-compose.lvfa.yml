services:
  # ── PostgreSQL（LVFA / Mondial Demo）──────────────────
  postgres-lvfa:
    image: postgres:16-alpine
    container_name: ontop-lvfa-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: test123
      POSTGRES_DB: lvfa_db
    ports:
      - "5436:5432"
    volumes:
      - ./ontop-db/postgres/init_lvfa.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - pgdata_lvfa:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d lvfa_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Native Java Ontop Builder API（LVFA）──────────────
  ontop-engine-lvfa:
    build:
      context: ./ontop-engine
      dockerfile: Dockerfile
    container_name: ontop-engine-lvfa
    depends_on:
      postgres-lvfa:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx2g"
      SQLITE_DB_PATH: /app/data/ontop_ui.db
      ENCRYPTION_KEY_PATH: /app/data/.encryption_key
      ONTOP_ENDPOINT_URL: http://ontop-endpoint-lvfa:8080
      ONTOP_ENDPOINT_ACTIVE_DIR: /opt/ontop-endpoint/active
      ONTOP_DATA_DIR: /app/data
      ONTOP_OUTPUT_DIR: /opt/ontop-output
    ports:
      - "8083:8081"
    volumes:
      - ./ontop-backend/data-lvfa:/app/data
      - ./ontop-endpoint/lvfa-active:/opt/ontop-endpoint/active
      - ./ontop-output:/opt/ontop-output

  # ── Dedicated Ontop SPARQL Endpoint（LVFA）────────────
  ontop-endpoint-lvfa:
    build:
      context: ./ontop-endpoint
      dockerfile: Dockerfile
    container_name: ontop-endpoint-lvfa
    depends_on:
      postgres-lvfa:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx1g"
      ONTOP_ACTIVE_ONTOLOGY_FILE: /opt/ontop-endpoint/active/active_ontology.ttl
      ONTOP_ACTIVE_MAPPING_FILE: /opt/ontop-endpoint/active/active_mapping.obda
      ONTOP_ACTIVE_PROPERTIES_FILE: /opt/ontop-endpoint/active/active.properties
    ports:
      - "18081:8080"
    volumes:
      - ./ontop-endpoint/lvfa-active:/opt/ontop-endpoint/active

  # ── FastAPI Backend（LVFA）────────────────────────────
  backend-lvfa:
    build:
      context: ./ontop-backend
      dockerfile: Dockerfile
    container_name: ontop-lvfa-backend
    depends_on:
      postgres-lvfa:
        condition: service_healthy
      ontop-engine-lvfa:
        condition: service_started
      ontop-endpoint-lvfa:
        condition: service_started
    environment:
      ONTOP_OUTPUT: /opt/ontop-output
      ONTOLOGY_FILE: /opt/ontop-output/lvfa_ontology.ttl
      MAPPING_FILE: /opt/ontop-output/lvfa_mapping.obda
      PROPERTIES_FILE: /opt/ontop-output/lvfa.properties
      ONTOP_ENDPOINT_URL: http://ontop-endpoint-lvfa:8080
      ONTOP_ENDPOINT_ADMIN_URL: http://ontop-endpoint-lvfa:8080
      ONTOP_ENDPOINT_PORT: "8080"
      ONTOP_ENDPOINT_ACTIVE_DIR: /opt/ontop-endpoint/active
      ONTOP_ENDPOINT_ACTIVE_ONTOLOGY_FILE: /opt/ontop-endpoint/active/active_ontology.ttl
      ONTOP_ENDPOINT_ACTIVE_MAPPING_FILE: /opt/ontop-endpoint/active/active_mapping.obda
      ONTOP_ENDPOINT_ACTIVE_PROPERTIES_FILE: /opt/ontop-endpoint/active/active.properties
      ONTOP_ENGINE_URL: http://ontop-engine-lvfa:8081
      FASTAPI_PORT: "8000"
      LLM_BASE_URL: http://host.docker.internal:1234/v1
      LLM_MODEL: zai-org/glm-4.7-flash
    ports:
      - "8001:8000"
    volumes:
      - ./ontop-output:/opt/ontop-output
      - ./ontop-backend/data-lvfa:/app/data
      - ./ontop-endpoint/lvfa-active:/opt/ontop-endpoint/active
      - ./ontop-db/properties/lvfa.properties:/opt/ontop-output/lvfa.properties:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Next.js Frontend（LVFA）───────────────────────────
  frontend-lvfa:
    build:
      context: ./ontop-ui
      dockerfile: Dockerfile
    container_name: ontop-lvfa-frontend
    depends_on:
      - backend-lvfa
      - ontop-engine-lvfa
    environment:
      BACKEND_URL: http://backend-lvfa:8000
      ENGINE_URL: http://ontop-engine-lvfa:8081
      PORT: "5000"
      COZE_PROJECT_ENV: PROD
    ports:
      - "3001:5000"

volumes:
  pgdata_lvfa:
