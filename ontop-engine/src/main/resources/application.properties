server.port=8081

# SQLite
sqlite.db-path=${SQLITE_DB_PATH:/app/data/ontop_ui.db}
sqlite.encryption-key-path=${ENCRYPTION_KEY_PATH:/app/data/.encryption_key}

# Ontop endpoint
ontop.endpoint.url=${ONTOP_ENDPOINT_URL:http://localhost:8080}
ontop.endpoint.active-dir=${ONTOP_ENDPOINT_ACTIVE_DIR:/opt/ontop-endpoint/active}

# Data directories for file browsing
ontop.data-dir=${ONTOP_DATA_DIR:/app/data}
ontop.output-dir=${ONTOP_OUTPUT_DIR:/opt/ontop-output}

# Shared internal secret for management API auth (empty = disabled)
ontop.internal-secret=${ONTOP_INTERNAL_SECRET:}
