apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ontop-aether
  namespace: ontop-aether
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    # SSE support for AI assistant streaming
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  rules:
    - host: ontop.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /sparql
            pathType: Prefix
            backend:
              service:
                name: endpoint
                port:
                  number: 8080
          - path: /ontology
            pathType: Prefix
            backend:
              service:
                name: endpoint
                port:
                  number: 8080
          - path: /ontop
            pathType: Prefix
            backend:
              service:
                name: endpoint
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: endpoint
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 5000
