# ontop-aether / Kubernetes
#
# Deploy:
#   kubectl apply -k k8s/
#
# Port-forward for local testing:
#   kubectl port-forward -n ontop-aether svc/frontend 3001:5000
#   kubectl port-forward -n ontop-aether svc/backend  8001:8000
#   kubectl port-forward -n ontop-aether svc/endpoint 18081:8080
#   kubectl port-forward -n ontop-aether svc/engine   8083:8081
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ontop-aether

resources:
  - namespace.yaml
  - secrets.yaml
  - configmap.yaml
  - postgres.yaml
  - backend.yaml
  - engine.yaml
  - endpoint.yaml
  - frontend.yaml
  - ingress.yaml
