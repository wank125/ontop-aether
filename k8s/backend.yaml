apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ontop-aether
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ontop-aether-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: FASTAPI_PORT
              valueFrom:
                configMapKeyRef:
                  name: ontop-config
                  key: FASTAPI_PORT
            - name: ONTOP_ENGINE_URL
              valueFrom:
                configMapKeyRef:
                  name: ontop-config
                  key: ONTOP_ENGINE_URL
            - name: ONTOP_ENDPOINT_URL
              valueFrom:
                configMapKeyRef:
                  name: ontop-config
                  key: ONTOP_ENDPOINT_URL
            - name: LLM_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: ontop-config
                  key: LLM_BASE_URL
            - name: LLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: ontop-config
                  key: LLM_MODEL
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ontop-secrets
                  key: LLM_API_KEY
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /api/v1/datasources
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: backend-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-data
  namespace: ontop-aether
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ontop-aether
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
