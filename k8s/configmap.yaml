apiVersion: v1
kind: ConfigMap
metadata:
  name: ontop-config
  namespace: ontop-aether
data:
  # PostgreSQL
  POSTGRES_HOST: "postgres.ontop-aether.svc.cluster.local"
  POSTGRES_PORT: "5432"

  # Backend (FastAPI)
  FASTAPI_PORT: "8000"
  ONTOP_ENGINE_URL: "http://engine.ontop-aether.svc.cluster.local:8081"
  ONTOP_ENDPOINT_URL: "http://endpoint.ontop-aether.svc.cluster.local:8080"
  LLM_BASE_URL: "http://host.docker.internal:1234/v1"
  LLM_MODEL: "zai-org/glm-4.7-flash"

  # Engine (Java Spring Boot)
  ENGINE_PORT: "8081"

  # Endpoint (Native Spring Boot + Ontop)
  ENDPOINT_PORT: "8080"

  # Frontend
  FRONTEND_PORT: "5000"
  BACKEND_URL: "http://backend.ontop-aether.svc.cluster.local:8000"
  COZE_PROJECT_ENV: "PROD"
